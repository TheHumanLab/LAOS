<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Architecture OS</title>
  <style>
    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --text: #111;
      --muted: #5c5c5c;
      --border: #e0e0e0;
      --accent: #111;
      --pattern: #1565c0;
      --osc: #c62828;
      --radius: 8px;
      --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      min-height: 100vh;
      padding: clamp(1rem, 4vw, 2.5rem);
    }

    .wrap {
      max-width: 42rem;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 1.125rem;
      font-weight: 650;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    header p {
      font-size: 0.8125rem;
      color: var(--muted);
      margin-top: 0.35rem;
    }

    .inputs {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.6875rem;
      font-weight: 650;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    textarea {
      width: 100%;
      min-height: 5.5rem;
      padding: 0.85rem 1rem;
      font: inherit;
      font-size: 0.9375rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      resize: vertical;
    }

    textarea:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }

    button {
      font: inherit;
      font-size: 0.8125rem;
      font-weight: 600;
      padding: 0.75rem 1.25rem;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      cursor: pointer;
    }

    button:hover { opacity: 0.92; }

    button.secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    #panel {
      display: none;
      margin: 2rem 0;
      padding: 1.25rem 1.35rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    #panel.visible { display: block; }

    .block { margin-bottom: 1.15rem; }
    .block:last-child { margin-bottom: 0; }

    .block h3 {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .block p {
      font-size: 0.9375rem;
    }

    .block.action p {
      font-weight: 600;
      padding-left: 0.75rem;
      border-left: 3px solid var(--accent);
    }

    .flags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-top: 0.75rem;
    }

    .flag {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 0.2rem 0.45rem;
      border-radius: 4px;
    }

    .flag.pattern { background: #e3f2fd; color: var(--pattern); }
    .flag.osc { background: #ffebee; color: var(--osc); }

    section.history {
      margin-top: 2.5rem;
    }

    section.history h2 {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 1rem;
      color: var(--muted);
    }

    .empty {
      font-size: 0.875rem;
      color: var(--muted);
      padding: 1rem 0;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      margin-bottom: 0.75rem;
      font-size: 0.875rem;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 0.65rem;
    }

    .pair {
      display: grid;
      gap: 0.75rem;
    }

    @media (min-width: 520px) {
      .pair { grid-template-columns: 1fr 1fr; }
    }

    .pair strong {
      display: block;
      font-size: 0.65rem;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.65rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Life Architecture OS</h1>
      <p>Log input → output. See patterns, oscillation, and next actions. Data stays in your browser.</p>
    </header>

    <section class="inputs" aria-label="Log entry">
      <div>
        <label for="what-happened">What happened</label>
        <textarea id="what-happened" placeholder="External event, trigger, or situation…"></textarea>
      </div>
      <div>
        <label for="what-you-did">What you did</label>
        <textarea id="what-you-did" placeholder="Your response, behavior, or choice…"></textarea>
      </div>
      <div class="row">
        <button type="button" id="btn-log">Log &amp; analyze</button>
        <button type="button" class="secondary" id="btn-clear">Clear history</button>
      </div>
    </section>

    <section id="panel" aria-live="polite">
      <div class="flags" id="flags"></div>
      <div class="block">
        <h3>Observation</h3>
        <p id="out-observation"></p>
      </div>
      <div class="block">
        <h3>Pattern</h3>
        <p id="out-pattern"></p>
      </div>
      <div class="block">
        <h3>Interpretation</h3>
        <p id="out-interpretation"></p>
      </div>
      <div class="block action">
        <h3>Action</h3>
        <p id="out-action"></p>
      </div>
    </section>

    <section class="history">
      <h2>History</h2>
      <div id="history-root"></div>
    </section>

    <footer>Stored locally · Life Architecture OS</footer>
  </div>

  <script>
(function () {
  const STORAGE_KEY = 'lifeArchitectureOS_v1';
  const LEGACY_KEY = 'la_os_data';

  const STOP = new Set([
    'the','a','an','and','or','but','in','on','at','to','for','of','with','by','from','as','is','was','are','were','been','be','have','has','had','do','does','did','will','would','could','should','may','might','must','can','this','that','these','those','i','you','he','she','it','we','they','my','your','their','what','which','who','when','where','why','how','not','no','so','if','then','just','like','about','into','through','over','after','before','again','there','here','some','any','very','more','much','too','also','only','even'
  ]);

  /** @type {{ id: string, at: string, happened: string, did: string, analysis?: object }[]} */
  let entries = [];

  function normalizePhrase(s) {
    return String(s || '').toLowerCase().trim().replace(/\s+/g, ' ');
  }

  function stripKey(s) {
    return normalizePhrase(s).replace(/[^a-z0-9\s]/g, '');
  }

  function tokens(s) {
    return stripKey(s)
      .split(/\s+/)
      .filter(function (w) { return w.length > 2 && !STOP.has(w); });
  }

  function unique(arr) {
    return Array.from(new Set(arr));
  }

  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        entries = JSON.parse(raw);
        if (!Array.isArray(entries)) entries = [];
        return;
      }
      var old = localStorage.getItem(LEGACY_KEY);
      if (old) {
        var parsed = JSON.parse(old);
        if (Array.isArray(parsed)) {
          entries = parsed.map(function (e) {
            return {
              id: String(e.id || Date.now() + Math.random()),
              at: e.timestamp || new Date().toISOString(),
              happened: e.input || '',
              did: e.output || ''
            };
          });
          save();
        }
      }
    } catch (e) {
      entries = [];
    }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }

  function analyze(happened, did) {
    var key = stripKey(happened);
    var prior = entries.filter(function (e) { return stripKey(e.happened) === key; });
    var outNorm = stripKey(did);
    var priorOuts = prior.map(function (e) { return stripKey(e.did); });
    var allOuts = priorOuts.concat([outNorm]);
    var distinctOut = unique(allOuts).length;
    var sameCount = prior.length + 1;
    var oscillating = distinctOut > 1 && prior.length >= 1;

    var toks = tokens(happened);
    var related = [];
    if (toks.length) {
      var set = new Set(toks);
      entries.forEach(function (e) {
        var overlap = tokens(e.happened).filter(function (t) { return set.has(t); });
        if (overlap.length >= 2) related.push({ entry: e, overlap: overlap.length });
      });
    }
    related.sort(function (a, b) { return b.overlap - a.overlap; });

    var patternParts = [];
    if (sameCount === 1) {
      patternParts.push('First log for this exact situation (normalized text match).');
    } else {
      patternParts.push('This situation (same normalized “what happened”) has been logged ' + sameCount + ' times.');
      if (!oscillating) {
        patternParts.push('Your response has been consistent so far.');
      }
    }
    if (related.length) {
      patternParts.push('Theme overlap: ' + related.length + ' earlier entr' + (related.length === 1 ? 'y' : 'ies') + ' share multiple keywords with this one.');
    }

    var observation = 'You recorded: “' + happened.trim() + '” → you did: “' + did.trim() + '”.';
    var pattern = patternParts.join(' ');
    var interpretation;
    var action;

    if (oscillating) {
      interpretation = 'Oscillation: the same class of situation has produced more than one kind of response. That often means competing rules, mood swings, or unclear priorities.';
      action = 'Pick one response you trust most for this situation, write it in one sentence, and use it as the default for the next three occurrences—then revisit.';
    } else if (sameCount >= 3) {
      interpretation = 'Stable loop: this trigger keeps showing up and you answer it in a repeatable way. That can be efficient—or automatic without review.';
      action = 'Once a week, ask: does this default response still match who you want to be? If not, change one variable (timing, tone, or boundary) on purpose.';
    } else if (related.length >= 3) {
      interpretation = 'Broader pattern: many logs echo the same themes even when the wording differs. The system may be stressing the same dimension of life.';
      action = 'Name the shared theme in five words, then choose one small structural change (calendar, boundary, or conversation) aimed at that theme.';
    } else if (sameCount === 2 && !oscillating) {
      interpretation = 'Early repeat: two data points with the same response—enough to notice, not enough to treat as permanent identity.';
      action = 'If this situation appears again, pause for ten seconds before acting; note whether the pause changes anything.';
    } else {
      interpretation = 'Single or sparse data. The architecture is still forming—favor curiosity over conclusions.';
      action = 'When a similar situation returns, log it again; the OS gets sharper with volume.';
    }

    return {
      observation: observation,
      pattern: pattern,
      interpretation: interpretation,
      action: action,
      flags: {
        repeat: sameCount >= 2,
        oscillation: oscillating,
        theme: related.length >= 2
      }
    };
  }

  function renderFlags(a) {
    var el = document.getElementById('flags');
    el.innerHTML = '';
    if (a.flags.oscillation) {
      var s = document.createElement('span');
      s.className = 'flag osc';
      s.textContent = 'Oscillation';
      el.appendChild(s);
    }
    if (a.flags.repeat) {
      var p = document.createElement('span');
      p.className = 'flag pattern';
      p.textContent = a.flags.oscillation ? 'Same situation · multiple responses' : 'Repeat situation';
      el.appendChild(p);
    }
    if (a.flags.theme && !a.flags.oscillation) {
      var t = document.createElement('span');
      t.className = 'flag pattern';
      t.textContent = 'Keyword pattern';
      el.appendChild(t);
    }
    if (!el.children.length) el.style.display = 'none';
    else el.style.display = 'flex';
  }

  function showAnalysis(a) {
    var panel = document.getElementById('panel');
    panel.classList.add('visible');
    renderFlags(a);
    document.getElementById('out-observation').textContent = a.observation;
    document.getElementById('out-pattern').textContent = a.pattern;
    document.getElementById('out-interpretation').textContent = a.interpretation;
    document.getElementById('out-action').textContent = a.action;
    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function renderHistory() {
    var root = document.getElementById('history-root');
    root.innerHTML = '';
    if (!entries.length) {
      var empty = document.createElement('p');
      empty.className = 'empty';
      empty.textContent = 'No entries yet.';
      root.appendChild(empty);
      return;
    }
    var copy = entries.slice().reverse();
    copy.forEach(function (e) {
      var key = stripKey(e.happened);
      var same = entries.filter(function (x) { return stripKey(x.happened) === key; });
      var outs = same.map(function (x) { return stripKey(x.did); });
      var osc = unique(outs).length > 1;

      var card = document.createElement('article');
      card.className = 'card';
      var meta = document.createElement('div');
      meta.className = 'card-meta';
      meta.innerHTML = '<span>' + new Date(e.at).toLocaleString() + '</span><span>#' + e.id.slice(-6) + '</span>';
      card.appendChild(meta);

      var pair = document.createElement('div');
      pair.className = 'pair';
      pair.innerHTML =
        '<div><strong>What happened</strong>' + escapeHtml(e.happened) + '</div>' +
        '<div><strong>What you did</strong>' + escapeHtml(e.did) + '</div>';
      card.appendChild(pair);

      if (same.length > 1 || osc) {
        var f = document.createElement('div');
        f.className = 'flags';
        if (same.length > 1) {
          var fp = document.createElement('span');
          fp.className = 'flag pattern';
          fp.textContent = '×' + same.length + ' same situation';
          f.appendChild(fp);
        }
        if (osc) {
          var fo = document.createElement('span');
          fo.className = 'flag osc';
          fo.textContent = 'Oscillation';
          f.appendChild(fo);
        }
        card.appendChild(f);
      }

      root.appendChild(card);
    });
  }

  function escapeHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML.replace(/\n/g, '<br>');
  }

  document.getElementById('btn-log').addEventListener('click', function () {
    var h = document.getElementById('what-happened').value;
    var d = document.getElementById('what-you-did').value;
    if (!normalizePhrase(h) || !normalizePhrase(d)) {
      alert('Please fill in both fields.');
      return;
    }
    var a = analyze(h, d);
    var entry = {
      id: String(Date.now()) + '-' + Math.random().toString(36).slice(2, 7),
      at: new Date().toISOString(),
      happened: h.trim(),
      did: d.trim(),
      analysis: a
    };
    entries.push(entry);
    save();
    showAnalysis(a);
    document.getElementById('what-happened').value = '';
    document.getElementById('what-you-did').value = '';
    renderHistory();
  });

  document.getElementById('btn-clear').addEventListener('click', function () {
    if (!entries.length) return;
    if (!confirm('Delete all saved entries?')) return;
    entries = [];
    save();
    document.getElementById('panel').classList.remove('visible');
    renderHistory();
  });

  load();
  renderHistory();
})();
  </script>
</body>
</html>
