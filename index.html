<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Architecture OS</title>

<style>
body { font-family: Arial; margin:0; background:#f5f4f1; }
.topbar { background:#111; color:#fff; padding:15px; display:flex; justify-content:space-between;}
.sidebar { width:220px; position:fixed; top:50px; bottom:0; background:#fff; border-right:1px solid #ddd;}
.sidebar button { width:100%; padding:12px; border:none; background:none; text-align:left; cursor:pointer;}
.sidebar button:hover { background:#eee;}
.main { margin-left:220px; padding:20px;}
.card { background:#fff; padding:15px; margin-bottom:12px; border-radius:10px; border:1px solid #eee;}
.alert { background:#ffeaea; padding:10px; border-radius:8px; color:#900;}
.good { background:#e8f7ee; color:#1b5e20;}
textarea, input { width:100%; padding:8px; margin-top:6px;}
button.primary { background:#111; color:#fff; border:none; padding:8px 12px; cursor:pointer;}
.small { font-size:12px; color:#666;}
</style>
</head>

<body>

<div class="topbar">
  <div>Life Architecture OS</div>
  <div>Intelligence Engine Active</div>
</div>

<div class="sidebar">
  <button onclick="show('dashboard')">System</button>
  <button onclick="show('behavior')">Behavior</button>
  <button onclick="show('tension')">Tension</button>
  <button onclick="show('patterns')">Patterns</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="module">
  <div class="card">
    <div>SIQ</div>
    <div style="font-size:40px" id="siq">0</div>
  </div>

  <div class="card">
    <div>Structural Load</div>
    <div id="load">0%</div>
  </div>

  <div id="osc" class="alert" style="display:none;">
    ⚠ Oscillation detected (unstable system)
  </div>

  <div class="card">
    <div>Prediction</div>
    <div id="prediction" class="small"></div>
  </div>

  <div class="card">
    <div>Recommendation</div>
    <div id="recommendation" class="small"></div>
  </div>
</div>

<!-- BEHAVIOR -->
<div id="behavior" class="module" style="display:none;">
  <div class="card">
    <div>Log Input → Output</div>
    <input id="input" placeholder="Input (e.g. poor sleep)">
    <input id="output" placeholder="Output (e.g. low focus)">
    <button class="primary" onclick="add()">Save</button>
  </div>
  <div id="log"></div>
</div>

<!-- TENSION -->
<div id="tension" class="module" style="display:none;">
  <div class="card">
    <div>Current Reality</div>
    <textarea id="reality"></textarea>
  </div>
  <div class="card">
    <div>Desired State</div>
    <textarea id="vision"></textarea>
  </div>
  <button class="primary" onclick="saveTension()">Save</button>

  <div class="card">
    <div>Tension Score</div>
    <div id="tensionScore"></div>
  </div>
</div>

<!-- PATTERNS -->
<div id="patterns" class="module" style="display:none;">
  <div class="card">
    <div>Patterns</div>
    <div id="patternsList"></div>
  </div>
</div>

</div>

<script>

/* ========= DATA ========= */

let data = JSON.parse(localStorage.getItem('os')) || {
  entries: [],
  reality: "",
  vision: ""
};

function save() {
  localStorage.setItem('os', JSON.stringify(data));
}

/* ========= NAV ========= */

function show(id){
  document.querySelectorAll('.module').forEach(m=>m.style.display='none');
  document.getElementById(id).style.display='block';
}

/* ========= INPUT ========= */

function add(){
  let input = document.getElementById('input').value.toLowerCase();
  let output = document.getElementById('output').value.toLowerCase();

  if(!input || !output) return;

  data.entries.push({input, output});
  save();
  render();
}

/* ========= TENSION ========= */

function saveTension(){
  data.reality = document.getElementById('reality').value.toLowerCase();
  data.vision = document.getElementById('vision').value.toLowerCase();
  save();
  render();
}

/* ========= ENGINE ========= */

function run(){

  let entries = data.entries;
  if(entries.length < 3) return;

  let map = {};
  let inputMap = {};

  entries.forEach(e=>{
    let key = e.input+"→"+e.output;
    map[key]=(map[key]||0)+1;

    if(!inputMap[e.input]) inputMap[e.input]=new Set();
    inputMap[e.input].add(e.output);
  });

  let patterns = Object.entries(map).filter(p=>p[1]>=2);

  let oscillation = Object.values(inputMap).some(set=>set.size>1);

  /* SIQ */
  let siq = Math.min(100,
    patterns.length*20 +
    (oscillation?0:30) +
    Math.log(entries.length+1)*20
  );

  document.getElementById('siq').innerText=Math.round(siq);

  /* LOAD */
  let load = Math.min(100, entries.length*6);
  document.getElementById('load').innerText=load+"%";

  document.getElementById('osc').style.display=oscillation?'block':'none';

  /* TENSION */
  let tension = 0;
  if(data.reality && data.vision){
    tension = Math.abs(data.vision.length - data.reality.length)*2;
  }
  document.getElementById('tensionScore').innerText = tension;

  /* PREDICTION */
  let prediction = "No clear trajectory yet.";
  if(patterns.length){
    prediction = "Current behavior patterns will likely continue. Outcome stability depends on oscillation.";
  }
  if(oscillation){
    prediction = "System instability detected. Outputs are inconsistent — burnout or failure likely if unchanged.";
  }

  document.getElementById('prediction').innerText = prediction;

  /* RECOMMENDATION */
  let rec = "No intervention needed.";

  if(oscillation){
    rec = "Stabilize inputs. Reduce variability in environment or routine.";
  }

  if(load > 70){
    rec = "Reduce load. Remove at least one repeated input causing strain.";
  }

  if(tension > 20){
    rec = "High tension: your current behavior does not match your desired state. Adjust structure, not effort.";
  }

  document.getElementById('recommendation').innerText = rec;

  /* PATTERNS UI */
  let list = document.getElementById('patternsList');
  list.innerHTML='';
  patterns.forEach(p=>{
    let div=document.createElement('div');
    div.className='card';
    div.innerText=p[0]+" ("+p[1]+"x)";
    list.appendChild(div);
  });
}

/* ========= RENDER ========= */

function render(){
  renderLog();
  run();
}

function renderLog(){
  let log=document.getElementById('log');
  log.innerHTML='';
  data.entries.slice().reverse().forEach(e=>{
    let d=document.createElement('div');
    d.className='card';
    d.innerText=e.input+" → "+e.output;
    log.appendChild(d);
  });
}

/* INIT */
document.getElementById('reality').value=data.reality;
document.getElementById('vision').value=data.vision;
render();

</script>

</body>
</html>
