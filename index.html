<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Architecture OS</title>

<style>
body { font-family: Arial; margin:0; background:#f5f4f1; color:#1a1916;}
.topbar { background:#111; color:#fff; padding:15px; display:flex; justify-content:space-between;}
.sidebar { width:230px; position:fixed; top:50px; bottom:0; background:#fff; border-right:1px solid #ddd;}
.sidebar button { width:100%; padding:12px; border:none; background:none; text-align:left; cursor:pointer;}
.sidebar button:hover { background:#eee;}
.main { margin-left:230px; padding:20px;}

.card { background:#fff; padding:16px; margin-bottom:12px; border-radius:10px; border:1px solid #eee;}
h2 { margin-top:0; }

textarea, input {
  width:100%; padding:8px; margin-top:6px;
}

button.primary {
  background:#111; color:#fff; border:none; padding:8px 12px; cursor:pointer;
}

.metric { font-size:32px; }

.alert { background:#ffeaea; padding:10px; border-radius:8px; color:#900; margin-bottom:10px;}
.good { background:#e8f7ee; color:#1b5e20;}

.small { font-size:12px; color:#666;}
</style>
</head>

<body>

<div class="topbar">
  <div>Life Architecture OS</div>
  <div>Structural Intelligence Active</div>
</div>

<div class="sidebar">
  <button onclick="show('dashboard')">Dashboard</button>
  <button onclick="show('identity')">Identity</button>
  <button onclick="show('behavior')">Behavior</button>
  <button onclick="show('decisions')">Decisions</button>
  <button onclick="show('tension')">Tension</button>
  <button onclick="show('patterns')">Patterns</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="module">
  <div class="card">
    <h2>System State</h2>
    <div>SIQ</div>
    <div class="metric" id="siq">0</div>
    <div>Load: <span id="load"></span></div>
  </div>

  <div id="osc" class="alert" style="display:none;">
    Oscillation detected — instability in behavior
  </div>

  <div class="card">
    <h2>Prediction</h2>
    <div id="prediction" class="small"></div>
  </div>

  <div class="card">
    <h2>Recommendation</h2>
    <div id="recommendation" class="small"></div>
  </div>
</div>

<!-- IDENTITY -->
<div id="identity" class="module" style="display:none;">
  <div class="card">
    <h2>Identity Nodes</h2>
    <textarea id="identityInput" placeholder="Define your active identities (Architect, Protector, etc)"></textarea>
    <button class="primary" onclick="saveIdentity()">Save</button>
  </div>
</div>

<!-- BEHAVIOR -->
<div id="behavior" class="module" style="display:none;">
  <div class="card">
    <h2>Log Behavior</h2>
    <input id="input" placeholder="Input (e.g. poor sleep)">
    <input id="output" placeholder="Output (e.g. low focus)">
    <button class="primary" onclick="addBehavior()">Save</button>
  </div>

  <div id="behaviorLog"></div>
</div>

<!-- DECISIONS -->
<div id="decisions" class="module" style="display:none;">
  <div class="card">
    <h2>Log Decision</h2>
    <input id="decisionInput" placeholder="Decision made">
    <button class="primary" onclick="addDecision()">Save</button>
  </div>

  <div id="decisionLog"></div>
</div>

<!-- TENSION -->
<div id="tension" class="module" style="display:none;">
  <div class="card">
    <h2>Current Reality</h2>
    <textarea id="reality"></textarea>
  </div>

  <div class="card">
    <h2>Desired State</h2>
    <textarea id="vision"></textarea>
    <button class="primary" onclick="saveTension()">Save</button>
  </div>

  <div class="card">
    <h2>Tension Score</h2>
    <div id="tensionScore"></div>
  </div>
</div>

<!-- PATTERNS -->
<div id="patterns" class="module" style="display:none;">
  <div class="card">
    <h2>Detected Patterns</h2>
    <div id="patternsList"></div>
  </div>
</div>

</div>

<script>

/* DATA */
let data = JSON.parse(localStorage.getItem('os')) || {
  behaviors: [],
  decisions: [],
  identity: "",
  reality: "",
  vision: ""
};

function save(){ localStorage.setItem('os', JSON.stringify(data)); }

/* NAV */
function show(id){
  document.querySelectorAll('.module').forEach(m=>m.style.display='none');
  document.getElementById(id).style.display='block';
}

/* IDENTITY */
function saveIdentity(){
  data.identity = document.getElementById('identityInput').value;
  save();
}

/* BEHAVIOR */
function addBehavior(){
  let input = document.getElementById('input').value.toLowerCase();
  let output = document.getElementById('output').value.toLowerCase();
  if(!input || !output) return;

  data.behaviors.push({input, output});
  save(); render();
}

/* DECISIONS */
function addDecision(){
  let d = document.getElementById('decisionInput').value;
  if(!d) return;
  data.decisions.push(d);
  save(); render();
}

/* TENSION */
function saveTension(){
  data.reality = document.getElementById('reality').value.toLowerCase();
  data.vision = document.getElementById('vision').value.toLowerCase();
  save(); render();
}

/* ENGINE */
function run(){

  let entries = data.behaviors;
  if(entries.length < 2) return;

  let map = {};
  let inputMap = {};

  entries.forEach(e=>{
    let key = e.input+"→"+e.output;
    map[key]=(map[key]||0)+1;

    if(!inputMap[e.input]) inputMap[e.input]=new Set();
    inputMap[e.input].add(e.output);
  });

  let patterns = Object.entries(map).filter(p=>p[1]>=2);
  let oscillation = Object.values(inputMap).some(s=>s.size>1);

  let siq = Math.min(100,
    patterns.length*20 +
    (oscillation?0:30) +
    Math.log(entries.length+1)*20
  );

  document.getElementById('siq').innerText=Math.round(siq);
  document.getElementById('load').innerText=(entries.length*6)+"%";
  document.getElementById('osc').style.display=oscillation?'block':'none';

  /* TENSION */
  let tension = 0;
  if(data.reality && data.vision){
    tension = Math.abs(data.vision.length - data.reality.length)*2;
  }
  document.getElementById('tensionScore').innerText = tension;

  /* PREDICTION */
  let prediction = "System forming...";
  if(oscillation){
    prediction = "Unstable system — inconsistent outputs will lead to failure if unchanged.";
  } else if(patterns.length){
    prediction = "Stable pattern detected — current trajectory will continue.";
  }
  document.getElementById('prediction').innerText = prediction;

  /* RECOMMENDATION */
  let rec = "No intervention needed.";

  if(oscillation){
    rec = "Stabilise inputs. Reduce environmental variability.";
  }
  if(tension > 20){
    rec = "Your behaviour does not match your desired state. Change structure.";
  }
  document.getElementById('recommendation').innerText = rec;

  /* PATTERNS UI */
  let list=document.getElementById('patternsList');
  list.innerHTML='';
  patterns.forEach(p=>{
    let d=document.createElement('div');
    d.className='card';
    d.innerText=p[0]+" ("+p[1]+"x)";
    list.appendChild(d);
  });
}

/* RENDER */
function render(){

  document.getElementById('identityInput').value = data.identity;
  document.getElementById('reality').value = data.reality;
  document.getElementById('vision').value = data.vision;

  let log=document.getElementById('behaviorLog');
  log.innerHTML='';
  data.behaviors.slice().reverse().forEach(e=>{
    let d=document.createElement('div');
    d.className='card';
    d.innerText=e.input+" → "+e.output;
    log.appendChild(d);
  });

  let dlog=document.getElementById('decisionLog');
  dlog.innerHTML='';
  data.decisions.slice().reverse().forEach(d=>{
    let div=document.createElement('div');
    div.className='card';
    div.innerText=d;
    dlog.appendChild(div);
  });

  run();
}

render();

</script>

</body>
</html>
