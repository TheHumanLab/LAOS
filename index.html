<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIFE ARCHITECTURE OS | V1</title>
    <style>
        /* 
           DESIGN SYSTEM: Minimalist, Neutral, Functional 
           The UI is built to feel like a high-end tool, not a toy.
        */
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --text-muted: #666666;
            --border: #e5e5e5;
            --accent: #000000;
            --system-bg: #f9f9f9;
            --oscillation-color: #ff4d4d;
            --pattern-color: #0070f3;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-main);
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 650px;
            width: 100%;
        }

        header {
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        header h1 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
        }

        header p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Input Section */
        .input-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        textarea {
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: var(--font-main);
            font-size: 1rem;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 4px;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        /* Response Panel */
        #response-panel {
            background: var(--system-bg);
            border: 1px solid var(--border);
            padding: 2rem;
            margin-bottom: 3rem;
            display: none; /* Hidden until first submission */
        }

        .response-block {
            margin-bottom: 1.5rem;
        }

        .response-label {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .response-content {
            font-size: 1rem;
            font-weight: 400;
        }

        .response-action {
            font-weight: 700;
            border-left: 3px solid var(--accent);
            padding-left: 1rem;
        }

        /* History Section */
        .history-section h2 {
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .entry-card {
            border: 1px solid var(--border);
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .entry-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .tag {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-top: 0.5rem;
        }

        .tag-oscillation { background: #ffebeb; color: #d0021b; }
        .tag-pattern { background: #ebf5ff; color: #0070f3; }

        footer {
            margin-top: 4rem;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            .entry-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Life Architecture OS</h1>
            <p>V1.0 • Systemic Input-Output Processor</p>
        </header>

        <!-- INPUT SYSTEM -->
        <section class="input-section">
            <div class="field-group">
                <label for="input-field">1. What Happened? (Input)</label>
                <textarea id="input-field" placeholder="e.g. Received a critical email from my manager..."></textarea>
            </div>
            <div class="field-group">
                <label for="output-field">2. What did you do? (Output)</label>
                <textarea id="output-field" placeholder="e.g. Apologized immediately and worked until 10pm..."></textarea>
            </div>
            <button onclick="handleSubmission()">Process Interaction</button>
        </section>

        <!-- SYSTEM OUTPUT PANEL -->
        <section id="response-panel">
            <div class="response-block">
                <div class="response-label">Observation</div>
                <div id="res-observation" class="response-content"></div>
            </div>
            <div class="response-block">
                <div class="response-label">Detected Pattern</div>
                <div id="res-pattern" class="response-content"></div>
            </div>
            <div class="response-block">
                <div class="response-label">System Interpretation</div>
                <div id="res-interpretation" class="response-content"></div>
            </div>
            <div class="response-block">
                <div class="response-label">Recommended Action</div>
                <div id="res-action" class="response-content response-action"></div>
            </div>
            <div id="res-question-wrapper" class="response-block" style="display:none;">
                <div class="response-label">Follow-up Question</div>
                <div id="res-question" class="response-content" style="font-style: italic;"></div>
            </div>
        </section>

        <!-- HISTORY VIEW -->
        <section class="history-section">
            <h2>Interaction Logs</h2>
            <div id="history-container">
                <!-- Entries will be injected here -->
            </div>
        </section>

        <footer>
            THE HUMAN LAB © 2024 • DATA STORED LOCALLY
        </footer>
    </div>

    <script>
        /**
         * LIFE ARCHITECTURE OS - CORE LOGIC
         */

        // --- DATA LAYER ---
        let state = {
            entries: []
        };

        const loadData = () => {
            const saved = localStorage.getItem('la_os_data');
            if (saved) {
                state.entries = JSON.parse(saved);
                renderHistory();
            }
        };

        const saveData = () => {
            localStorage.setItem('la_os_data', JSON.stringify(state.entries));
        };

        // --- LOGIC LAYER (The "Brain") ---

        // Normalizes text for better pattern matching
        const normalize = (text) => text.toLowerCase().trim().replace(/[^\w\s]/gi, '');

        const detectPatterns = (currentInput) => {
            const normalizedInput = normalize(currentInput);
            const matches = state.entries.filter(e => normalize(e.input) === normalizedInput);
            
            const outputs = matches.map(m => normalize(m.output));
            const uniqueOutputs = [...new Set(outputs)];
            
            return {
                count: matches.length,
                uniqueOutputs: uniqueOutputs,
                isOscillating: uniqueOutputs.length > 1,
                lastOutput: matches.length > 0 ? matches[matches.length - 1].output : null
            };
        };

        const generateResponse = (entry) => {
            const analysis = detectPatterns(entry.input);
            
            // This structure is future-proofed for OpenAI API replacement
            let response = {
                observation: `You recorded an external input: "${entry.input}". Your selected response was: "${entry.output}".`,
                pattern: "New data point. Insufficient history for pattern detection.",
                interpretation: "Initial architecture entry.",
                action: "Observe if this input recurs within the next 72 hours.",
                question: "What was the physiological feeling right before you responded?"
            };

            if (analysis.count > 0) {
                const totalOccurrences = analysis.count + 1;
                response.pattern = `This input has occurred ${totalOccurrences} times.`;

                if (analysis.isOscillating) {
                    response.interpretation = "OSCILLATION DETECTED: You are responding differently to the same structural input. This indicates system instability.";
                    response.action = "Identify which of your previous responses led to a better long-term outcome and standardize it.";
                } else {
                    response.interpretation = "STABLE PATTERN: Your system has a consistent output for this input.";
                    response.action = "Evaluate if this consistent output serves your long-term architecture or if it's a legacy habit.";
                }
            }

            return response;
        };

        // --- UI LAYER ---

        const handleSubmission = () => {
            const inputEl = document.getElementById('input-field');
            const outputEl = document.getElementById('output-field');

            if (!inputEl.value || !outputEl.value) {
                alert("Both fields are required for analysis.");
                return;
            }

            const newEntry = {
                id: Date.now(),
                timestamp: new Date().toISOString(),
                input: inputEl.value,
                output: outputEl.value
            };

            // Generate structured response before saving to history
            const response = generateResponse(newEntry);

            // Save
            state.entries.push(newEntry);
            saveData();

            // Display Response
            displayResponse(response);

            // Reset Form & Refresh History
            inputEl.value = '';
            outputEl.value = '';
            renderHistory();
        };

        const displayResponse = (res) => {
            const panel = document.getElementById('response-panel');
            panel.style.display = 'block';

            document.getElementById('res-observation').innerText = res.observation;
            document.getElementById('res-pattern').innerText = res.pattern;
            document.getElementById('res-interpretation').innerText = res.interpretation;
            document.getElementById('res-action').innerText = res.action;
            
            if (res.question) {
                document.getElementById('res-question-wrapper').style.display = 'block';
                document.getElementById('res-question').innerText = res.question;
            }

            panel.scrollIntoView({ behavior: 'smooth' });
        };

        const renderHistory = () => {
            const container = document.getElementById('history-container');
            container.innerHTML = '';

            // Render in reverse chronological order
            [...state.entries].reverse().forEach(entry => {
                // Check patterns for labels
                const matches = state.entries.filter(e => normalize(e.input) === normalize(entry.input));
                const uniqueOutputs = [...new Set(matches.map(m => normalize(m.output)))];
                
                const card = document.createElement('div');
                card.className = 'entry-card';
                
                let tags = '';
                if (matches.length > 1) {
                    tags += `<span class="tag tag-pattern">PATTERN: ${matches.length}x</span> `;
                }
                if (uniqueOutputs.length > 1) {
                    tags += `<span class="tag tag-oscillation">OSCILLATION</span>`;
                }

                card.innerHTML = `
                    <div class="entry-header">
                        <span>${new Date(entry.timestamp).toLocaleString()}</span>
                        <span>ID: ${entry.id.toString().slice(-4)}</span>
                    </div>
                    <div class="entry-grid">
                        <div>
                            <div class="response-label">Input</div>
                            <div>${entry.input}</div>
                        </div>
                        <div>
                            <div class="response-label">Output</div>
                            <div>${entry.output}</div>
                        </div>
                    </div>
                    <div>${tags}</div>
                `;
                container.appendChild(card);
            });
        };

        // Initialize App
        window.onload = loadData;

    </script>
</body>
</html>
